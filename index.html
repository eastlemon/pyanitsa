<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Пьяница — карточная игра</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>" />
</head>
<body>
  <!-- Экран выбора режима -->
  <div class="mode-screen" id="mode-screen">
    <div class="mode-content">
      <h1>🃏 Пьяница</h1>
      <p class="mode-subtitle">Выбери режим</p>
      <div class="mode-cards">
        <button class="mode-card" id="mode-classic">
          <span class="mode-icon">⚡</span>
          <span class="mode-name">Классика</span>
          <span class="mode-desc">Одна кнопка. Класть карты по очереди. Шестёрка бьёт туза.</span>
        </button>
        <button class="mode-card" id="mode-preview">
          <span class="mode-icon">👁</span>
          <span class="mode-name">Просмотр</span>
          <span class="mode-desc">Подсмотри до 3 карт перед боем. Проиграл — отдаёшь все ставки.</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Игровое поле -->
  <div class="game-board" id="board" style="display:none;">
    <div class="header">
      <h1>Пьяница</h1>
      <p id="peek-info"></p>
    </div>

    <div class="counters">
      <div class="counter player">
        <span class="counter-label">Ты</span>
        <span class="counter-value" id="player-count">18</span>
      </div>
      <div class="counter ai">
        <span class="counter-label">Соперник</span>
        <span class="counter-value" id="ai-count">18</span>
      </div>
    </div>

    <div class="deck-area">
      <div></div>
      <div class="deck" id="ai-deck">
        <div class="deck-stack">
          <div class="deck-stack-card" style="top:4px;left:4px;"></div>
          <div class="deck-stack-card" style="top:2px;left:2px;"></div>
          <div class="deck-stack-card"></div>
        </div>
      </div>
    </div>

    <div class="table" id="table">
      <div class="table-slot" id="table-player"></div>
      <div class="vs-label">VS</div>
      <div class="table-slot" id="table-ai"></div>
    </div>

    <div class="deck-area">
      <div></div>
      <div class="deck" id="player-deck">
        <div class="deck-stack">
          <div class="deck-stack-card" style="top:4px;left:4px;"></div>
          <div class="deck-stack-card" style="top:2px;left:2px;"></div>
          <div class="deck-stack-card"></div>
        </div>
      </div>
    </div>

    <div class="action-area">
      <button class="btn-play" id="play-btn">Класть!</button>
      <button class="btn-peek" id="peek-btn" style="display:none;">👁 Подсмотреть (3)</button>
      <span class="round-label" id="round-label">Раунд 0</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
